<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Matheübung</title>

<style>

body{
font-family:Arial;
padding:20px;
}

.container{
display:flex;
gap:80px;
}

.block{
display:flex;
flex-direction:column;
align-items:center;
}

.blocktitle{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

.columns{
display:flex;
gap:30px;
}

.columnWrapper{
display:flex;
flex-direction:column;
align-items:center;
}

.column{
display:flex;
flex-direction:column;
gap:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
min-height:36px;
}

input{
width:80px;
padding:8px;
font-size:18px;
}

button{
padding:6px 10px;
font-size:16px;
border-radius:6px;
border:1px solid #888;
background:#eee;
cursor:pointer;
}

.correct{background:#8cff8c;}
.wrong{background:#ff8c8c;}
.skip{background:#ff8c8c;}

.rounded{
margin-left:5px;
font-weight:bold;
width:40px;
}

.failCount,.skipX{
color:red;
font-weight:bold;
width:20px;
text-align:center;
}

.character{
margin-top:15px;
text-align:center;
}

.avatar{
font-size:40px;
}

.bubble{
margin-top:5px;
background:white;
border:2px solid #333;
border-radius:15px;
padding:6px;
min-width:90px;
text-align:center;
font-size:12px;
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="block">
<div class="blocktitle">Fensterseite</div>
<div class="columns">

<div class="columnWrapper">
<div class="column" id="col0"></div>
<div class="character">
<div class="avatar">🙂</div>
<div class="bubble" id="bubble0"></div>
</div>
</div>

<div class="columnWrapper">
<div class="column" id="col1"></div>
<div class="character">
<div class="avatar">🙂</div>
<div class="bubble" id="bubble1"></div>
</div>
</div>

</div>
</div>

<div class="block">
<div class="blocktitle">Türseite</div>
<div class="columns">

<div class="columnWrapper">
<div class="column" id="col2"></div>
<div class="character">
<div class="avatar">🙂</div>
<div class="bubble" id="bubble2"></div>
</div>
</div>

<div class="columnWrapper">
<div class="column" id="col3"></div>
<div class="character">
<div class="avatar">🙂</div>
<div class="bubble" id="bubble3"></div>
</div>
</div>

</div>
</div>

</div>

<script>

const solutions=[
[-1.3,5,2,14.3,1,2,-2.1],
[-1.6,2.5,1.5,12.4,3,4,-3.2],
[1.2,3.4,5.6,7.8,9.1,2.3,4.5],
[2.1,4.3,6.5,8.7,1.9,3.2,5.4]
];

const displayValues = [
[15,6,3,9,7,10,2],
[3,7,7,3,8,6,9],
[1,3,6,8,9,2,5],
[2,4,7,9,2,3,5]
];

const tips = [
["Quotientenregel beachtet? Taschenrechner auf Bogenmaß?",
"Maximum wenn f'(x)=0",
"tan(x)=sin(x)/cos(x)",
"Gegebereignis betrachten",
"Kettenregel!",
`Treffen sich ein dx und ein Delta x. Sagt das Delta x: "Sieh doch nicht immer alles so eng"`,
"Kettenregel"],

["Quotientenregel beachtet? Taschenrechner auf Bogenmaß?",
"Maximum wenn f'(x)=0",
"tan(x)=sin(x)/cos(x)",
"Gegebereignis betrachten",
"Kettenregel!",
"Warum können Piraten keinen Kreis berechnen? - Weil sie Pi raten!",
"Kettenregel"],

["Quotientenregel beachtet? Taschenrechner auf Bogenmaß?",
"Maximum wenn f'(x)=0",
"tan(x)=sin(x)/cos(x)",
"Gegebereignis betrachten",
"Kettenregel!",
`Treffen sich ein dx und ein Delta x. Sagt das Delta x: "Sieh doch nicht immer alles so eng"`,
"Kettenregel"],

["Quotientenregel beachtet? Taschenrechner auf Bogenmaß?",
"Maximum wenn f'(x)=0",
"tan(x)=sin(x)/cos(x)",
"Gegebereignis betrachten",
"Kettenregel!",
"Warum können Piraten keinen Kreis berechnen? - Weil sie Pi raten!",
"Kettenregel"]
];

const columns=4;
const rows=7;

let attempts=Array.from({length:columns},()=>Array(rows).fill(0));
let current=Array(columns).fill(0);
let tipUsed=Array.from({length:columns},()=>Array(rows).fill(false));

function createInputs(){

for(let c=0;c<columns;c++){

let column=document.getElementById("col"+c);

for(let r=0;r<rows;r++){

let row=document.createElement("div");
row.className="row";

let label=document.createElement("span");
label.textContent=(r+1)+".";

let input=document.createElement("input");

// ✅ ANDROID FIX
input.type="number";
input.step="any";

input.dataset.col=c;
input.dataset.row=r;

if(r!==0) input.disabled=true;

let button=document.createElement("button");
button.textContent="✓";
button.onclick=()=>check(input,button);

input.addEventListener("keydown",e=>{
if(e.key==="Enter") check(input,button);
});

let tipBtn=document.createElement("button");
tipBtn.textContent="💡";
tipBtn.onclick=()=>showTip(c,r,tipBtn);

let rounded=document.createElement("span");
rounded.className="rounded";

let fail=document.createElement("span");
fail.className="failCount";

let skip=document.createElement("span");
skip.className="skipX";

row.append(label,input,button,tipBtn,rounded,fail,skip);
column.appendChild(row);

}

}

}

function clearBubbles(){
for(let i=0;i<columns;i++){
document.getElementById("bubble"+i).style.display="none";
}
}

function showTip(col,row,btn){

if(row !== current[col]) return;
if(tipUsed[col][row]) return;

tipUsed[col][row]=true;
btn.disabled=true;

let bubble=document.getElementById("bubble"+col);
bubble.textContent=tips[col][row] || "Kein Tipp";
bubble.style.display="block";

setTimeout(()=>{
bubble.style.display="none";
},5000);

}

function check(input,button){

let col=parseInt(input.dataset.col);
let row=parseInt(input.dataset.row);

if(row!==current[col]) return;

let value=parseFloat(input.value.toString().replace(",","."));
let solution=solutions[col][row];

let fail=input.parentElement.querySelector(".failCount");

if(Math.abs(value-solution)<0.001){

input.classList.remove("wrong");
input.classList.add("correct");

input.disabled=true;
button.style.display="none";

let result = displayValues[col][row];
if(tipUsed[col][row]) result--;

input.parentElement.querySelector(".rounded").textContent="→ "+result;

fail.textContent="";

clearBubbles();

current[col]++;
enableNext(col);

}else{

attempts[col][row]++;
input.classList.add("wrong");
input.value="";

fail.textContent=attempts[col][row];

if(attempts[col][row]>=3){

input.classList.remove("wrong");
input.classList.add("skip");

input.disabled=true;
button.style.display="none";

input.parentElement.querySelector(".skipX").textContent="X";

fail.textContent="";

clearBubbles();

current[col]++;
enableNext(col);

}

}

}

function enableNext(col){

let next=current[col];

if(next<rows){

let inputs=document.querySelectorAll(`input[data-col='${col}']`);
let buttons=document.querySelectorAll(`#col${col} button`);

inputs[next].disabled=false;
buttons[next].disabled=false;

inputs[next].focus();

}

}

createInputs();

</script>

</body>
</html>
